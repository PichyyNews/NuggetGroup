services:
  s2admin:
    image: dpage/pgadmin4
    container_name: 67-s2-admin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - secure-net
    depends_on:
      s2db:
        condition: service_healthy